name: covoiturage

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: covoiturage-db
    environment:
      POSTGRES_DB: covoiturage
      POSTGRES_USER: covoiturage
      POSTGRES_PASSWORD: covoiturage
    volumes:
      - covoiturage-pgdata:/var/lib/postgresql/data
      - ./backend/init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covoiturage -d covoiturage"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: covoiturage-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/covoiturage
      SPRING_DATASOURCE_USERNAME: covoiturage
      SPRING_DATASOURCE_PASSWORD: covoiturage
      JWT_SECRET: docker-secret-a-remplacer-32-caracteres-minimum-svp
      APP_CORS_ALLOWED_ORIGINS: http://10.11.31.98:5173
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: covoiturage-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

  # interface web pour inspecter la base (http://localhost:8081)
  adminer:
    image: adminer:latest
    container_name: covoiturage-adminer
    depends_on:
      - db
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db

volumes:
  covoiturage-pgdata:
