server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA : toutes les routes inconnues renvoient index.html
    # (sinon /historique, /trajets/:id, etc. donnent un 404 au rafraichissement).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
