name: covoiturage-dev

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: covoiturage
      POSTGRES_USER: covoiturage
      POSTGRES_PASSWORD: covoiturage
    volumes:
      - covoiturage-pgdata:/var/lib/postgresql/data
      - ./backend/init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covoiturage -d covoiturage"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/covoiturage
      SPRING_DATASOURCE_USERNAME: covoiturage
      SPRING_DATASOURCE_PASSWORD: covoiturage
      JWT_SECRET: docker-secret-a-remplacer-32-caracteres-minimum-svp
      APP_CORS_ALLOWED_ORIGINS: http://10.11.31.98:5173
    ports:
      - "8080:8080"
    develop:
      watch:
        - action: rebuild
          path: ./backend/src
        - action: rebuild
          path: ./backend/pom.xml

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    depends_on:
      - backend
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: sync+restart
          path: ./frontend/vite.config.js
          target: /app/vite.config.js
        - action: rebuild
          path: ./frontend/package.json

volumes:
  covoiturage-pgdata: